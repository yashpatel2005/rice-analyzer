<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rice Analyzer{% endblock %}</title>
    <meta name="description" content="Rice Grain Morphometric Analysis System — AI-powered grain measurement, classification and grading.">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- noUiSlider for dual-handle range sliders -->
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
    <!-- Custom styles -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Rice Analyzer</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if active_page == 'home' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a href="/camera" class="nav-item {% if active_page == 'camera' %}active{% endif %}">
                <i class="bi bi-camera-video"></i>
                <span>Camera</span>
            </a>
            <a href="/analysis" class="nav-item {% if active_page == 'analysis' %}active{% endif %}">
                <i class="bi bi-search"></i>
                <span>Analysis</span>
            </a>
            <a href="/reports" class="nav-item {% if active_page == 'reports' %}active{% endif %}">
                <i class="bi bi-file-earmark-bar-graph"></i>
                <span>Reports</span>
            </a>
            <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <i class="bi bi-bar-chart-line"></i>
                <span>Power BI Dashboard</span>
            </a>
            <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="calibration-status" id="calibrationStatus">
                <i class="bi bi-info-circle"></i>
                <span>Checking calibration...</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-content" id="mainContent">
        <div class="topbar">
            <button class="btn btn-sm btn-outline-light sidebar-toggle-mobile" id="sidebarToggleMobile">
                <i class="bi bi-list"></i>
            </button>
            <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
            <div class="topbar-actions">
                <span class="badge bg-success" id="systemStatus" style="font-size:0.78rem; padding: 5px 10px; border-radius:20px;">
                    <i class="bi bi-circle-fill" style="font-size:0.5rem;"></i> System Ready
                </span>
            </div>
        </div>

        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loadingText">Processing...</p>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Image fullscreen modal -->
    <div class="img-modal-backdrop" id="imgModalBackdrop" onclick="closeImgModal(event)">
        <button class="img-modal-close" onclick="closeImgModal(null, true)">
            <i class="bi bi-x-lg"></i>
        </button>
        <img id="imgModalImg" src="" alt="Preview">
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
